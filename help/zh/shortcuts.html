<h1>键盘快捷键</h1>
<p>以下是 CWY 串口助手支持的快捷键，可显著提升操作效率。</p>

<h2>发送操作</h2>
<table class="kv">
<tr><td>Ctrl + Enter</td><td>发送发送面板中的数据</td></tr>
</table>

<h2>文件加载</h2>
<p>通过菜单 <strong>发送区 → 加载到发送</strong> 可将文件加载到发送面板。程序会根据文件扩展名自动选择模式：</p>
<table>
<tr><th>文件类型</th><th>加载方式</th></tr>
<tr><td><code>.bin</code> 等二进制文件</td><td>自动以 HEX 模式加载</td></tr>
<tr><td>文本文件</td><td>以文本模式加载</td></tr>
</table>

<div class="info">💡 HEX 模式加载时，文件内容会自动转换为空格分隔的十六进制字节序列。</div>
