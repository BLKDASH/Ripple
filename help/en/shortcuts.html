<h1>Keyboard Shortcuts</h1>
<hr>
<table>
<tr><td><code>Ctrl+Enter</code></td><td>Send data from the send pane</td></tr>
<tr><td><code>Ctrl+O</code></td><td>Open a file into the send pane (text mode)</td></tr>
<tr><td><code>Ctrl+Shift+O</code></td><td>Open a file into the send pane (hex mode)</td></tr>
</table>
